name: CI

on:
  push:
    branches: [main]
  pull_request:

# NOTE: there is no git remote yet, so this workflow has never executed. The
# first push to GitHub is what verifies it. Findings below (WebKit host deps)
# were validated locally in Playwright's bundled browsers; because Playwright
# pins the browser builds, CI uses the same binaries, so the main residual CI
# risk is system libraries (covered by `--with-deps`).

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gating: typecheck + lint (incl. seam rules) + node unit tests + build.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check

  # Gating: real-OPFS read/write contract in headless Chromium.
  browser-opfs-chromium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:browser

  # Informational only (ADR 0006 — iOS/WebKit is best-effort, not gating).
  # continue-on-error keeps a WebKit failure from failing the build.
  browser-opfs-webkit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-webkit-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bunx playwright install --with-deps webkit
      - run: bun run test:browser-webkit

  # The webgpu (SwiftShader) job is retired per ADR 0009: the reduction stage
  # is CPU/WebCodecs, and its determinism/golden tests run as node unit tests
  # in `check`.

  # Deploy the static bundle to Cloudflare Workers on push to main, only after
  # the gating jobs pass. WebKit is intentionally excluded from `needs` (it is
  # informational and may fail).
  #
  # Required repo secrets (Settings → Secrets and variables → Actions):
  #   CLOUDFLARE_API_TOKEN   — token with Workers Scripts:Edit + the zone's
  #                            Workers Routes edit rights for chronowhoop.com
  #   CLOUDFLARE_ACCOUNT_ID  — the account owning the chronowhoop.com zone
  deploy:
    needs: [check, browser-opfs-chromium]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
